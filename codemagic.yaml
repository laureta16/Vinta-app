# Codemagic Configuration for Vinta
# See: https://docs.codemagic.io/getting-started/codemagic-yaml/

workflows:
  vinta-ios-workflow:
    name: Vinta iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Get Flutter dependencies
        script: flutter pub get
      - name: Build iOS IPA
        script: |
          # The --no-codesign is for testing, real App Store requires certificates
          flutter build ios --release --no-codesign
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - YOUR_EMAIL_HERE

  vinta-android-workflow:
    name: Vinta Android Release
    max_build_duration: 30
    instance_type: mac_mini_m1
    environment:
      flutter: stable
    scripts:
      - name: Get Flutter dependencies
        script: flutter pub get
      - name: Build Android APK
        script: flutter build apk --release
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
    publishing:
      email:
        recipients:
          - YOUR_EMAIL_HERE
